# Gate.io API 설정
gate:
  api:
    key: ${GATE_API_KEY:}
    secret: ${GATE_API_SECRET:}
    host: https://api.gateio.ws/api/v4
    settle: usdt

# 이벤트 저장소 (H2 embedded, 파일 기반 영속)
spring:
  datasource:
    url: jdbc:h2:file:./data/events;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# 봇 설정
bot:
  contracts:
    - BTC_USDT
  leverage: 5
  order-size: 1
  check-interval-sec: 60

# 전략 설정은 profile 파일(application-dev.yml 등)에서 명시적으로 주입한다.
# application.yml에 기본값을 두지 않는 이유: prod host에서 override를 잊으면
# 의도하지 않은 기본 전략이 실계좌에서 돌 수 있다. 미정의 contract는 no-op.

# 로깅
logging:
  level:
    com.parkj3onghoon.gatefuturesbot: INFO
  # MDC의 contract 키를 [contract=...] 포맷으로 표시. 워커 로그 추적 용이.
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} %replace(- [contract=%X{contract}] ){'- \\[contract=\\] ', '- '} %msg%n"
