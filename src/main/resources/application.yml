# Gate.io API 설정
gate:
  api:
    key: ${GATE_API_KEY:}
    secret: ${GATE_API_SECRET:}
    host: https://api.gateio.ws/api/v4
    settle: usdt

# 봇 설정
bot:
  contracts:
    - BTC_USDT
  leverage: 5
  order-size: 1
  check-interval-sec: 60

# 전략 설정 (contract별). 설정 없으면 해당 contract는 no-op
strategy:
  contracts:
    BTC_USDT:
      long-entries:
        - indicator: RSI
          operator: LT
          value: 30.0
          period: 14
      short-entries:
        - indicator: RSI
          operator: GT
          value: 70.0
          period: 14
      exit-conditions:
        - type: TAKE_PROFIT_PCT
          pct: 5.0
        - type: STOP_LOSS_PCT
          pct: 3.0

# 로깅
logging:
  level:
    com.parkj3onghoon.gatefuturesbot: INFO
